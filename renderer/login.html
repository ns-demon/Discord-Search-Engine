<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Discord Vault Login</title>

<link rel="stylesheet" href="style.css">


<meta http-equiv="Content-Security-Policy"
content="
default-src 'self';
script-src 'self';
style-src 'self';
">

</head>


<body>


<div class="login-box">


<h2>
Unlock Vault
</h2>


<p>
Enter your PIN
</p>



<input
id="password"
type="password"
maxlength="6"
placeholder="PIN"
/>



<br><br>



<button id="unlock">
Unlock
</button>



<p id="status"></p>


</div>




<script src="login.js"></script>


</body>

</html>
